name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: devtools-jar
          path: target/*.jar

  build-windows:
    name: Build Windows Native Binary
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Get Project Version
        id: version
        shell: pwsh
        run: |
          [Xml]$Xml = Get-Content pom.xml
          $VERSION = $Xml.project.version
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "JAR_NAME=devtools-$VERSION" >> $env:GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Native Image
        shell: pwsh
        timeout-minutes: 30
        continue-on-error: true
        run: |
          $env:JAVA_HOME = $env:GRAALVM_HOME
          $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"
          
          native-image `
            --no-fallback `
            --initialize-at-build-time `
            -H:+ReportExceptionStackTraces `
            -H:ReflectionConfigurationFiles=src/main/resources/META-INF/native-image/reflect-config.json `
            -H:ResourceConfigurationFiles=src/main/resources/META-INF/native-image/resource-config.json `
            --add-opens=java.base/java.util=ALL-UNNAMED `
            --add-opens=java.base/java.lang=ALL-UNNAMED `
            -Djavafx.platform=win `
            -jar target/${{ env.JAR_NAME }}.jar `
            target/DevUtils-Windows.exe

      - name: Set Version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_ENV
          } else {
            $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
            echo "VERSION=dev-$SHORT_SHA" >> $env:GITHUB_ENV
          }

      - name: Create Archive
        shell: pwsh
        if: success()
        run: |
          mkdir target\dist
          Copy-Item target/DevUtils-Windows.exe target/dist/
          Compress-Archive -Path target/dist/* -DestinationPath target/DevUtils-${{ env.VERSION }}-windows-x64.zip

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DevUtils-windows-x64
          path: target/DevUtils-${{ env.VERSION }}-windows-x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: target/DevUtils-${{ env.VERSION }}-windows-x64.zip
          token: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Native Binary
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Get Project Version
        id: version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "JAR_NAME=devtools-$VERSION" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Native Image
        shell: bash
        timeout-minutes: 30
        continue-on-error: true
        run: |
          export JAVA_HOME=$GRAALVM_HOME
          export PATH=$JAVA_HOME/bin:$PATH
          
          native-image \
            --no-fallback \
            --initialize-at-build-time \
            -H:+ReportExceptionStackTraces \
            -H:ReflectionConfigurationFiles=src/main/resources/META-INF/native-image/reflect-config.json \
            -H:ResourceConfigurationFiles=src/main/resources/META-INF/native-image/resource-config.json \
            --add-opens=java.base/java.util=ALL-UNNAMED \
            --add-opens=java.base/java.lang=ALL-UNNAMED \
            -Djavafx.platform=mac \
            -jar target/${{ env.JAR_NAME }}.jar \
            target/DevUtils-macOS

      - name: Set Version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "VERSION=dev-$SHORT_SHA" >> $GITHUB_ENV
          fi

      - name: Create Archive
        shell: bash
        if: success()
        run: |
          mkdir -p target/dist
          cp target/DevUtils-macOS target/dist/
          chmod +x target/dist/DevUtils-macOS
          cd target/dist
          zip -r ../DevUtils-${{ env.VERSION }}-macos-x64.zip .

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DevUtils-macos-x64
          path: target/DevUtils-${{ env.VERSION }}-macos-x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: target/DevUtils-${{ env.VERSION }}-macos-x64.zip
          token: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        shell: bash
        run: |
          echo "## 🚀 DevUtils ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 📦 Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- **[JAR](devtools-${{ github.ref_name }}.jar)** - Cross-platform (requires Java 17+)" >> RELEASE_NOTES.md
          
          if [ -f "artifacts/DevUtils-windows-x64/*.zip" ]; then
            echo "- **[Windows](DevUtils-${{ github.ref_name }}-windows-x64.zip)** - Native binary (no Java required)" >> RELEASE_NOTES.md
          fi
          
          if [ -f "artifacts/DevUtils-macos-x64/*.zip" ]; then
            echo "- **[macOS](DevUtils-${{ github.ref_name }}-macos-x64.zip)** - Native binary (no Java required)" >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "### 📝 Changes" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
          else
            echo "* Initial release" >> RELEASE_NOTES.md
          fi
          
          cat RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/devtools-jar/*.jar
            artifacts/DevUtils-windows-x64/*.zip
            artifacts/DevUtils-macos-x64/*.zip
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
