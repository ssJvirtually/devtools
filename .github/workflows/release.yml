name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: devtools-jar
          path: target/devtools-*.jar

  build-windows:
    name: Build Windows Native Binary
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Liberica NIK (JDK 25 + JavaFX)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Get Project Version
        id: version
        shell: pwsh
        run: |
          $VERSION = mvn help:evaluate -Dexpression=project.version -q -DforceStdout
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "JAR_NAME=devtools-$VERSION" >> $env:GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Native Image
        shell: pwsh
        timeout-minutes: 30
        run: |
          $JAR_FILE = "target/$env:JAR_NAME.jar"
          if (-not (Test-Path $JAR_FILE)) {
              $JAR_FILE = Get-ChildItem "target/devtools-*.jar" | Select-Object -First 1 -ExpandProperty FullName
          }
          
          native-image `
            --no-fallback `
            --initialize-at-build-time `
            -H:+ReportExceptionStackTraces `
            -H:ReflectionConfigurationFiles=src/main/resources/META-INF/native-image/reflect-config.json `
            -H:ResourceConfigurationFiles=src/main/resources/META-INF/native-image/resource-config.json `
            --add-opens=java.base/java.util=ALL-UNNAMED `
            --add-opens=java.base/java.lang=ALL-UNNAMED `
            -Djavafx.platform=win `
            -jar "$JAR_FILE" `
            -o target/DevUtils-Windows

      - name: Set Release Version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $REL_VERSION = "${{ github.ref_name }}"
          } else {
            $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
            $REL_VERSION = "dev-$SHORT_SHA"
          }
          echo "REL_VERSION=$REL_VERSION" >> $env:GITHUB_ENV

      - name: Create Archive
        shell: pwsh
        run: |
          mkdir target\dist
          Copy-Item target/DevUtils-Windows.exe target/dist/
          Compress-Archive -Path target/dist/* -DestinationPath target/DevUtils-$env:REL_VERSION-windows-x64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevUtils-windows-x64
          path: target/DevUtils-*-windows-x64.zip

  build-macos:
    name: Build macOS Native Binary
    runs-on: macos-13
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Liberica NIK (JDK 25 + JavaFX)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Get Project Version
        id: version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "JAR_NAME=devtools-$VERSION" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Native Image
        shell: bash
        timeout-minutes: 30
        run: |
          JAR_FILE="target/$JAR_NAME.jar"
          if [ ! -f "$JAR_FILE" ]; then
              JAR_FILE=$(ls target/devtools-*.jar | head -n 1)
          fi
          
          native-image \
            --no-fallback \
            --initialize-at-build-time \
            -H:+ReportExceptionStackTraces \
            -H:ReflectionConfigurationFiles=src/main/resources/META-INF/native-image/reflect-config.json \
            -H:ResourceConfigurationFiles=src/main/resources/META-INF/native-image/resource-config.json \
            --add-opens=java.base/java.util=ALL-UNNAMED \
            --add-opens=java.base/java.lang=ALL-UNNAMED \
            -Djavafx.platform=mac \
            -jar "$JAR_FILE" \
            -o target/DevUtils-macOS

      - name: Set Release Version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "REL_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "REL_VERSION=dev-$SHORT_SHA" >> $GITHUB_ENV
          fi

      - name: Create Archive
        shell: bash
        run: |
          mkdir -p target/dist
          cp target/DevUtils-macOS target/dist/
          chmod +x target/dist/DevUtils-macOS
          cd target/dist
          zip -r ../DevUtils-${REL_VERSION}-macos-x64.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevUtils-macos-x64
          path: target/DevUtils-*-macos-x64.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "## 🚀 DevUtils $TAG_NAME" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 📦 Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # Find JAR file
          JAR_FILE=$(find artifacts/devtools-jar -name "*.jar" ! -name "original-*" | head -n 1)
          if [ -n "$JAR_FILE" ]; then
            JAR_NAME=$(basename "$JAR_FILE")
            cp "$JAR_FILE" .
            echo "- **[JAR]($JAR_NAME)** - Cross-platform (requires Java 25+)" >> RELEASE_NOTES.md
          fi
          
          # Find Windows ZIP
          WIN_ZIP=$(find artifacts/DevUtils-windows-x64 -name "*.zip" | head -n 1)
          if [ -n "$WIN_ZIP" ]; then
            WIN_NAME=$(basename "$WIN_ZIP")
            cp "$WIN_ZIP" .
            echo "- **[Windows]($WIN_NAME)** - Native binary (no Java required)" >> RELEASE_NOTES.md
          fi
          
          # Find macOS ZIP
          MAC_ZIP=$(find artifacts/DevUtils-macos-x64 -name "*.zip" | head -n 1)
          if [ -n "$MAC_ZIP" ]; then
            MAC_NAME=$(basename "$MAC_ZIP")
            cp "$MAC_ZIP" .
            echo "- **[macOS]($MAC_NAME)** - Native binary (no Java required)" >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "### 📝 Changes" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
          else
            echo "* Initial release" >> RELEASE_NOTES.md
          fi
          
          cat RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.jar
            *.zip
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
